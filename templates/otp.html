{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="glass-card" style="width: 400px; padding: 4rem 3rem; position: relative;">
        <!-- Top Glow -->
        <div style="position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 100px; height: 100px; background: radial-gradient(circle, rgba(112,0,255,0.2) 0%, transparent 70%);"></div>

        <h2 style="margin-bottom: 0.5rem; font-weight: 800; font-size: 2.5rem; text-align: center;">Node <span class="text-gradient">Verify</span></h2>
        <p style="color: var(--text-muted); margin-bottom: 3.5rem; font-size: 1.1rem; text-align: center;">Confirm your identity to authorize node access.</p>
        
        <form method="POST">
            <div class="form-group" style="margin-bottom: 3.5rem;">
                <label style="text-align: center; display: block; margin-bottom: 1.5rem;">6-Digit Authorization Token</label>
                <input type="text" name="otp" class="form-control" maxlength="6" pattern="\d{6}" placeholder="000000" style="text-align: center; font-size: 2.5rem; letter-spacing: 0.75rem; border-color: var(--primary); background: rgba(112,0,255,0.05);" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Confirm Connection</button>
        </form>
        
        <div style="margin-top: 2.5rem; text-align: center;">
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2.5rem;">
            An encrypted handshake token has been broadcast to your node. 
            <br><span style="color: var(--secondary); font-size: 0.75rem; font-weight: 700;">[DEV_HINT: CHECK TERMINAL LOGS FOR TOKEN]</span>
        </p>
        </div>
    </div>
</div>
{% endblock %}
