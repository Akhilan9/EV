{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="glass-card" style="width: 100%; max-width: 600px; text-align: center; padding: 5rem 3rem;">
        <div style="width: 80px; height: 80px; background: rgba(255,77,77,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2.5rem; font-size: 2.5rem; color: var(--danger); border: 2px solid var(--danger);">⏻</div>
        
        <h1 style="font-weight: 800; font-size: 3rem; margin-bottom: 1.5rem;" class="text-gradient">Node Decoupled</h1>
        
        <p style="color: var(--text-muted); font-size: 1.1rem; line-height: 1.6; margin-bottom: 3.5rem;">
            Your charging session has been securely finalized and written to the global blockchain. 
            The physical energy link is now disengaged.
        </p>

        <div style="background: rgba(0,0,0,0.2); padding: 1.5rem; border-radius: 1rem; margin-bottom: 4rem; text-align: left; border-left: 4px solid var(--danger);">
            <div style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.5rem;">Security Status</div>
            <div style="font-weight: 700; color: #fff;">SESSION_TERMINATED | BYPASS_PROTECT_ON</div>
        </div>

        <a href="{{ url_for('home') }}" class="btn btn-primary btn-block" style="padding: 1.5rem; font-size: 1rem;">
            Exit Network Hub
        </a>
    </div>
</div>
{% endblock %}
